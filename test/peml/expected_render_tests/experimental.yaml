      starter:
        files:
        - name: starter1.txt
      frame:
        files:
        - name: wrapper1.txt
      solutions:
      - name: reference
        summary: an optional description
        correct: 'true'
        files:
        - name: solution_file_1.java
    environment:
      start:
        image: docker stuff
        repository: xxx
        repository_path: xxx
        files: []
      build:
        image: docker stuff
        repository: xxx
        repository_path: xxx
        files:
