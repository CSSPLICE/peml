        repository: xxx
        repository_branch: xxx
        repository_path: xxx
        files:
        - name: name3
        - name: name4
      test:
        image: docker stuff
        repository: xxx
        repository_path: xxx
        files:
        - name: name5
        - name: name6
    suites:
    - name: foo
      visibility: public | private | ...
      type: mime type or tag or whatever
      template: self.assertEqual({{expected}}, subject.squirrelPlay({{temp}}, {{isSummer}}))
      cases:
      - stdin: racecar
        stdout: '"racecar" is a palindrome.'
      - stdin: Flintstone
        stdout: '"Flintstone" is not a palindrome.'
      - stdin: url(some/local/input.txt)
        stdout: url(some/local/output.txt)
      - stdin: url(http://my.school.edu/some/local/generator/input)
        stdout: url(http://my.school.edu/some/local/generator/output)
