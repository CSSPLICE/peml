  instructions: |
    This method takes an integer array as a parameter and returns true
    if the array includes an odd integer; otherwise, the method returns false.
    For example, if the array passed stores {12, 7, 8, 25, 3}, the method returns
    true. If the array contains 0 element, the method returns false.
