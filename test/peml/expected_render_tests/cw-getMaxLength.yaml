  instructions: |
    This method takes an ArrayList of Strings as a parameter and returns
    the length of the longest String in the list. If the list is empty, the method
    should return 0. For example, if an ArrayList variable called list stores
    {"four", "and", "years", "ago"}, findMaxLength(list) should return 5.
