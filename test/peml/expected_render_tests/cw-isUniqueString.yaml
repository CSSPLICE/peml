  instructions: |
    This method accepts a String object as a parameter. It returns true
    if the String has all unique characters, false otherwise. For example, if
    the String is "coding", the method returns true; if the String is "Lambda",
    the method returns false. The method should return true if the the length
    of the String is less than 1.
