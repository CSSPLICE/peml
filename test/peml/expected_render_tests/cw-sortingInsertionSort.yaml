              public int[] insertionSort(int[] arr)
              {
                  //Iterate through each index of the array
                  for (int i=1; i<arr.length; ++i)
                  {
                      //Key value is set to the current index of the outer loop
                      int key = arr[i];

                      //Index to begin comparisons to key value
                      int j = i-1;

