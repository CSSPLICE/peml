  instructions: |
    This method accepts two integer arrays as its parameters and returns
    a new array, which contains all of the elements of first parameter array followed
    by all of the elements of the second parameter array.  For example, if the
    first parameter is {-4, -5, -3, -6} and the second parameter is {5, 5, 5,
    5}, the method returns {-4, -5, -3, -6, 5, 5, 5, 5}.
