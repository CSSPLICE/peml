  instructions: |
    The following method takes an integer array as a parameter. Write code
    that loops through the array to find the value 1. If 1 is found, increment
    a `counter` variable. Once the loop finishes, return the value of the `counter`,
    which is the number of 1's found. If the array is empty, return 0.
