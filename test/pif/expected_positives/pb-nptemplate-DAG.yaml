    title: NP-completeness proof template
    author: Cliff Shaffer
    license:
      id: MIT
      owner:
        name: Cliff Shaffer
        email: shaffer@vt.edu
    tags:
      topics: PEML NP-completeness
      style: parsons, order
    instructions: "<p>Show the general process for an NP-Completeness Proof.</p>\n"
    systems:
    - language: natural
      assets:
        code:
          blocks:
            content:
            - blockid: starter
              display: 'To prove that a problem X is NP-complete do this:'
              depends: ''
            - blockid: xinNP
              display: |-
                <ol>
                  <li>Show that X is in NP.</li>
                </ol>
              depends: starter
            - blockid: algorithm
              display: Create an algorithm to solve X (that might or might not use
                non-determinism) that runs in polynomial time.
              depends: xinNP
            - blockid: starthard
              display: |-
                <ol>
                  <li>Show that X is NP-hard.</li>
                </ol>
              depends: algorithm
            - blockid: choose
              display: Choose a known NP-hard problem A.
              depends: starthard
            - blockid: trans
              display: Define two transformations.
              depends: choose
            - blockid: t1
              display: Describe a polynomial-time algorithm that takes an arbitrary
                instance $\textbf{I}$ of A to an instance $\textbf{I′}$ of X.
              depends: trans
            - blockid: d1
              display: Describe a polynomial-time algorithm that takes an arbitrary
                instance $\textbf{I}$ of X to an instance $\textbf{I′}$ of A.
              depends: "-1"
            - blockid: t2
              display: Describe a polynomial-time transformation from the solution
                for $\textbf{I’}$ in problem X (call it $\textbf{SLN’}$) to $\textbf{SLN}$
                such that $\textbf{SLN}$ is the solution for $\textbf{I}$ in problem
                A.
              depends: trans
            - blockid: d2
              display: Describe a polynomial-time transformation from the solution
                for $\textbf{I’}$ in problem A (call it $\textbf{SLN’}$) to $\textbf{SLN}$
                such that $\textbf{SLN}$ is the solution for $\textbf{I}$ in problem
                X.
              depends: "-1"
  :diagnostics: []
