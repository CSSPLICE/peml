  :value:
    exercise_id: https://github.com/CSSPLICE/peml-feasibility-examples/blob/main/parsons/pb-nptemplate.peml
    title: NP-completeness proof template
    author: Cliff Shaffer
    license:
      id: MIT
      owner:
        name: Cliff Shaffer
        email: shaffer@vt.edu
    tags:
      topics: PEML NP-completeness
      style: parsons, order
    instructions: "<p>Show the general process for an NP-Completeness Proof.</p>\n"
    systems:
    - language: natural
      assets:
        code:
          blocks:
            content:
            - blockid: starter
              display: 'To prove that a problem X is NP-complete do this:'
              depends: ''
            - blockid: inNP
              depends: starter
              blocklist:
              - blockid: xinNP
                display: Show that X is in NP.
              - blockid: algorithm
                display: Create an algorithm to solve X (that might or might not use
                  non-determinism) that runs in polynomial time.
                depends: xinNP
            - blockid: NPhard
              depends: starter
              blocklist:
              - blockid: starthard
                display: Show that X is NP-hard.
              - blockid: choose
                display: Choose a known NP-hard problem A.
                depends: starthard
              - blockid: trans
                display: Define two transformations.
                depends: choose
              - blockid: t1
                display: Describe a polynomial-time algorithm that takes an arbitrary
                  instance $\textbf{I}$ of <code>A`X</code> to an instance $\textbf{I′}$
                  of <code>X`A</code>.
                depends: trans
                toggle_options:
                - :start_index: 82
                  :end_index: 89
                  :values:
                  - A
                  - X
                - :start_index: 118
                  :end_index: 125
                  :values:
                  - X
                  - A
              - blockid: t2
                display: Describe a polynomial-time transformation from the solution
                  for $\textbf{I’}$ in problem <code>X`A</code> (call it $\textbf{SLN’}$)
                  to $\textbf{SLN}$ such that $\textbf{SLN}$ is the solution for $\textbf{I}$
                  in problem <code>A`X</code>.
                depends: trans
                toggle_options:
                - :start_index: 85
                  :end_index: 92
                  :values:
                  - X
                  - A
                - :start_index: 190
                  :end_index: 197
                  :values:
                  - A
                  - X
  :diagnostics: []
