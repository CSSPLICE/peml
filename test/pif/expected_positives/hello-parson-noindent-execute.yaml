parsed:
  :value:
    exercise_id: https://github.com/CSSPLICE/peml-feasibility-examples/blob/main/parsons/hello-parson-noindent-execute.peml
    title: Your First Parsons Problem -- Execute
    license:
      id: MIT
      owner:
        name: Cliff Shaffer
        email: shaffer@vt.edu
    tags:
      topics: PEML Demo Parsons Problem
      style: parsons, execute
    instructions: '**Your task**: Construct a Python program that prints strings "Hello",
      "Parsons", and "Problems" on their own lines. You can get feedback on your current
      solution with the feedback button. You should construct your program by dragging
      and dropping the lines to the solution area on the right.

      '
    systems:
    - language: Python
      assets:
        code:
          wrapper:
            files:
            - content: "    ___\n"
          blocks:
            content:
            - blockid: one
              display: print('Hello')
            - blockid: two
              display: print('Parsons')
            - blockid: three
              display: print('Problems!')
        test:
          files:
          - type: text/csv-unquoted
            content: |
              expected
              Hello\nParsons\nProblems!
  :diagnostics: &1
  - 'Path ''/systems/0/assets/test/files/0'' is missing key: format'
renderable: *1
