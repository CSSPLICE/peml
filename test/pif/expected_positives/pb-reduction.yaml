    tags:
      topics: PEML reduction
      style: parsons, order
    instructions: "<p>Show the general process for reducing one problem to another.</p>\n"
    systems:
    - language: natural
      assets:
        code:
          blocks:
            content:
            - blockid: start
              display: Consider any two problems for which a suitable reduction from
                one to the other can be found.
              depends: ''
            - blockid: first
              display: The first problem takes an arbitrary instance of its input,
                which we will call $\textbf{I}$, and transforms $\textbf{I}$ to a
                solution, which we will call $\textbf{SLN}$.
              depends: start
            - blockid: second
              display: The second problem takes an arbitrary instance of its input,
                which we will call $\textbf{I’}$, and transforms $\textbf{I’}$ to
                a solution, which we will call $\textbf{SLN’}$.
              depends: first
            - blockid: transform
              display: Transform an arbitrary instance of the first problem to an
                instance of the second problem. In other words, there must be a transformation
                from any instance $\textbf{I}$ of the first problem to an instance
                $\textbf{I’}$ of the second problem.
              depends: second
            - blockid: algorithm
              display: Apply an algorithm for the second problem to the instance $\textbf{I’}$,
                yielding a solution $\textbf{SLN’}$.
              depends: transform
            - blockid: finish
              display: Transform $\textbf{SLN’}$ to the solution of $\textbf{I}$,
                known as $\textbf{SLN}$. Note that $\textbf{SLN}$ must in fact be
                the correct solution for $\textbf{I}$ for the reduction to be acceptable.
              depends: transform
  :diagnostics: []
