  :value:
    exercise_id: https://github.com/CSSPLICE/peml-feasibility-examples/blob/main/parsons/pb-Clique2IS.peml
    title: Clique to Independent Set
    author: Cliff Shaffer
    license:
      id: MIT
      owner:
        name: Cliff Shaffer
        email: shaffer@vt.edu
    tags:
      topics: PEML NP-completeness
      style: parsons, order
    instructions: "<p>Show a proof that the decision form of Independent Set is NP-complete.</p>\n"
    systems:
    - language: natural
      assets:
        code:
          blocks:
            content:
            - blockid: inNPblock
              blocklist:
              - blockid: inNP
                display: Show that INDEPENDENT SET is in NP.
                depends: ''
              - blockid: algorithm
                display: Nondeterministically guess some subset of the vertices. If
                  this set is at least of size k (k is the parameter to the decision
                  problem), and the vertices are all independent, then return YES.
                  Otherwise return NO.
                depends: inNP
              - blockid: d1
                display: Nondeterministically guess some collection of vertices. If
                  the vertices are independent, and if it is the biggest such set,
                  then return YES. Otherwise return NO.
                depends: "-1"
            - blockid: NPhardblock
              blocklist:
              - blockid: NPhard
                display: |-
                  <ol>
                    <li>Show that INDEPENDENT SET is NP-hard by using a reduction $\$
                  of known NP-comlete problem CLIQUE to IS.</li>
                  </ol>
                depends: ''
              - blockid: d3
                display: |-
                  <ol>
                    <li>Show that INDEPENDENT SET is NP-hard by using a reduction $\$
                  of IS to known NP-complete problem CLIQUE.</li>
                  </ol>
                depends: "-1"
              - blockid: starthard
                display: Show transformations to reduce <code>CLIQUE`IS</code> to
                  <code>IS`CLIQUE</code>.
                depends: NPhard
                toggle_options:
                - :start_index: 31
                  :end_index: 44
                  :values:
                  - CLIQUE
                  - IS
                - :start_index: 48
                  :end_index: 61
                  :values:
                  - IS
                  - CLIQUE
              - blockid: reduce
                display: |-
                  <table>
                    <tbody>
                      <tr>
                        <td>To reduce a [CLIQUE</td>
                        <td>IS] input instance to an [IS</td>
                        <td>CLIQUE] input instance for a given graph $G = (V , E)$, construct a complementary graph $G’ = (V’ , E’)$ such that:</td>
                      </tr>
                    </tbody>
                  </table>
                depends: starthard
              - blockid: step1
                display: a. $V = V’$. That is, the complement graph will have the
                  same vertices as the original graph.
                depends: reduce
              - blockid: step2
                display: b. $E’$ is the complement of $E$ that is $G’$ has all the
                  edges that is $\textbf{not}$ present in $G$.
                depends: step1
              - blockid: polynomial
                display: Construction of the complementary graph can be done in polynomial
                  time.
                depends: step2
              - blockid: iff
                display: We need to show that with this reduction, there is an independent
                  set of size k in the complement graph if and only iff there exists
                  a clique of size k in G.
                depends: step2
              - blockid: if
                display: "$\\textbf{If there is an independent set of size $k$ in
                  the complement graph $G’$}$, it implies no two vertices share an
                  edge in $G’$, which further implies all of those vertices share
                  an edge with all others in $G$ forming a clique. That is, $\\textbf{there
                  exists a clique of size $k$ in $G$}$."
                depends: iff
              - blockid: onlyif
                display: "$\\textbf{If there is a clique of size $k$ in the graph
                  $G$}$, it implies all vertices share an edge with all others in
                  $G$, which further implies no two of these vertices share an edge
                  in $G’$ (thus forming an Independent Set. That is, $\\textbf{there
                  exists an independent set of size $k$ in $G’$}$."
                depends: iff
  :diagnostics: []
